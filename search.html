<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회의 참석자 조회 · AI Meeting Coordinator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --surface2:#1c2128;
      --border:  #30363d;
      --accent:  #58a6ff;
      --green:   #3fb950;
      --orange:  #ffa657;
      --red:     #f78166;
      --purple:  #d2a8ff;
      --text:    #e6edf3;
      --muted:   #8b949e;
    }

    body {
      font-family: 'Inter', 'Apple SD Gothic Neo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .header-icon { font-size: 22px; }
    .header-title { font-size: 16px; font-weight: 600; }
    .header-sub   { font-size: 12px; color: var(--muted); margin-left: auto; }
    .back-link {
      font-size: 12px; color: var(--accent);
      text-decoration: none; border: 1px solid var(--border);
      padding: 5px 12px; border-radius: 6px;
      transition: background .15s;
    }
    .back-link:hover { background: var(--border); }

    /* ── LAYOUT ── */
    .layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 0;
      height: calc(100vh - 53px);
    }

    /* ── LEFT PANEL ── */
    .left-panel {
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .8px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .input-group { display: flex; flex-direction: column; gap: 6px; }
    .input-group label { font-size: 13px; font-weight: 500; }
    .input-group input,
    .input-group textarea {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      padding: 10px 12px;
      outline: none;
      transition: border-color .15s;
      resize: none;
    }
    .input-group input:focus,
    .input-group textarea:focus { border-color: var(--accent); }
    .input-group textarea { min-height: 100px; line-height: 1.6; }
    .input-hint { font-size: 11px; color: var(--muted); }

    /* tokens */
    .tokens-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      min-height: 44px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }
    .token {
      background: rgba(88,166,255,.15);
      border: 1px solid rgba(88,166,255,.3);
      color: var(--accent);
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
    }
    .token-empty { font-size: 12px; color: var(--muted); }

    /* buttons */
    .btn-row { display: flex; gap: 8px; }
    .btn-primary {
      flex: 1;
      background: var(--accent);
      color: #0d1117;
      border: none;
      border-radius: 8px;
      padding: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn-primary:hover { opacity: .85; }
    .btn-secondary {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-secondary:hover { background: var(--border); }

    .shortcut-hint { font-size: 11px; color: var(--muted); text-align: center; }
    kbd {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 10px;
    }

    /* ── RIGHT PANEL ── */
    .right-panel {
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .right-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .tab-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      transition: all .15s;
    }
    .tab-btn.active {
      background: rgba(88,166,255,.15);
      color: var(--accent);
    }
    .result-count {
      margin-left: auto;
      font-size: 12px;
      color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 3px 10px;
      border-radius: 20px;
    }

    /* tabs */
    .tab-content { display: none; flex: 1; padding: 20px 24px; }
    .tab-content.active { display: block; }

    /* result cards */
    #results { display: flex; flex-direction: column; gap: 12px; }

    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
      position: relative;
      transition: border-color .15s;
    }
    .result-card:hover { border-color: var(--accent); }

    .card-rank {
      position: absolute;
      top: 12px; right: 14px;
      font-size: 11px; font-weight: 600;
      color: var(--orange);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    .card-avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(88,166,255,.3), rgba(210,168,255,.3));
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700; color: var(--accent);
      flex-shrink: 0;
    }
    .card-name { font-size: 15px; font-weight: 600; }
    .card-meta { display: flex; gap: 8px; align-items: center; margin-top: 2px; }
    .card-dept { font-size: 12px; color: var(--muted); }
    .card-pos  { font-size: 12px; font-weight: 600; }
    .card-score {
      margin-left: auto; margin-right: 60px;
      text-align: center;
    }
    .score-num   { font-size: 22px; font-weight: 700; color: var(--green); }
    .score-label { font-size: 10px; color: var(--muted); }
    .card-duty   { font-size: 13px; color: var(--muted); line-height: 1.5; margin-bottom: 8px; }
    .card-matches { font-size: 12px; color: var(--muted); display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .match-badge {
      background: rgba(63,185,80,.15);
      border: 1px solid rgba(63,185,80,.3);
      color: var(--green);
      border-radius: 4px;
      padding: 1px 7px;
      font-size: 11px;
    }

    /* empty state */
    #empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    #empty .empty-icon { font-size: 48px; margin-bottom: 12px; }
    #empty p { font-size: 14px; }

    /* all employees table */
    .table-wrap {
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    thead th {
      background: var(--surface2);
      padding: 10px 14px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: .5px;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid rgba(48,54,61,.6); }
    tbody tr:hover td { background: rgba(255,255,255,.02); }
    tbody td { padding: 10px 14px; vertical-align: top; }
    .table-name { font-weight: 600; }
    .duty-cell  { color: var(--muted); max-width: 300px; }
    .tag-chip {
      display: inline-block;
      background: rgba(88,166,255,.1);
      border: 1px solid rgba(88,166,255,.2);
      color: var(--accent);
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 11px;
      margin: 1px 2px;
    }

    /* ── 역할 선택 버튼 ── */
    .card-roles {
      display: flex;
      gap: 6px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .role-btn {
      flex: 1;
      padding: 5px 0;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
    }
    .role-btn:hover { background: var(--border); color: var(--text); }
    .role-btn.role-required { background: rgba(210,168,255,.15); border-color: rgba(210,168,255,.4); color: var(--purple); font-weight: 700; }
    .role-btn.role-optional  { background: rgba(88,166,255,.15);  border-color: rgba(88,166,255,.4);  color: var(--accent); font-weight: 700; }
    .role-btn.role-excluded  { background: rgba(255,255,255,.05); border-color: var(--border);        color: var(--muted); }

    /* 역할 뱃지 (카드 이름 옆) */
    .role-badge { display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: 11px; font-weight: 600; margin-left: 6px; }
    .badge-required { background: rgba(210,168,255,.15); border: 1px solid rgba(210,168,255,.35); color: var(--purple); }
    .badge-optional  { background: rgba(88,166,255,.15);  border: 1px solid rgba(88,166,255,.35);  color: var(--accent); }
    .badge-excluded  { background: rgba(255,255,255,.05); border: 1px solid var(--border);         color: var(--muted); }

    /* 테이블 역할 버튼 */
    thead th:last-child { width: 160px; }

    /* 싱크 토스트 */
    .sync-toast {
      position: fixed;
      bottom: 24px; right: 24px;
      background: rgba(63,185,80,.9);
      color: #0d1117;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      z-index: 9999;
      animation: slideUp .25s ease, fadeOut .3s ease 1.9s forwards;
      pointer-events: none;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeOut {
      to { opacity: 0; transform: translateY(-4px); }
    }
  </style>
</head>
<body>

<header class="header">
  <span class="header-icon">🔍</span>
  <span class="header-title">회의 참석자 조회</span>
  <span class="header-sub">직원 DB 키워드 매칭 · 추천 엔진</span>
  <a class="back-link" href="/">← 메인으로</a>
</header>

<div class="layout">

  <!-- ── LEFT: 입력 폼 ── -->
  <div class="left-panel">

    <div>
      <div class="section-label">회의 정보 입력</div>
      <div class="input-group" style="margin-bottom:12px">
        <label for="inp-title">회의명</label>
        <input id="inp-title" type="text" placeholder="예) 2026 Q3 마케팅 전략 수립 회의" />
      </div>
      <div class="input-group">
        <label for="inp-agenda">회의 안건</label>
        <textarea id="inp-agenda" placeholder="예) 브랜드 인지도 제고 방안 수립, 플랫폼 광고 예산 조정, SNS 캠페인 기획"></textarea>
        <span class="input-hint">📌 관련 업무 키워드를 구체적으로 입력할수록 추천 정확도가 높아집니다</span>
      </div>
    </div>

    <div>
      <div class="section-label">추출된 키워드</div>
      <div class="tokens-box" id="tokens">
        <span class="token-empty">안건을 입력하면 추출된 키워드가 표시됩니다</span>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn-primary" id="btn-search">🔍 관련자 조회</button>
      <button class="btn-secondary" id="btn-clear">초기화</button>
    </div>
    <div class="shortcut-hint"><kbd>Ctrl</kbd> + <kbd>Enter</kbd> 로 바로 조회</div>

    <!-- 예시 버튼 -->
    <div>
      <div class="section-label">최근 안건</div>
      <div style="display:flex;flex-direction:column;gap:6px;">
        <button class="btn-secondary" style="text-align:left;font-size:12px;" data-title="정보보안 점검 회의" data-agenda="개인정보보호 컴플라이언스 점검, 침해사고 대응 체계 수립, 보안 취약점 개선">정보보안 점검 회의</button>
        <button class="btn-secondary" style="text-align:left;font-size:12px;" data-title="디지털 채널 UX 개선 회의" data-agenda="모바일 앱 고객 경험 분석, AI 챗봇 서비스 도입 검토, 데이터 파이프라인 구축">디지털 채널 UX 개선 회의</button>
        <button class="btn-secondary" style="text-align:left;font-size:12px;" data-title="신규 채용 전략 회의" data-agenda="인재 채용 프로세스 개선, 역량 개발 교육 프로그램 기획, 조직 배치 방안">신규 채용 전략 회의</button>
        <button class="btn-secondary" style="text-align:left;font-size:12px;" data-title="여신 리스크 관리 회의" data-agenda="자본 적정성 평가, 금융감독 규정 컴플라이언스, 내부통제 심사 방안">여신 리스크 관리 회의</button>
      </div>
    </div>

  </div>

  <!-- ── RIGHT: 결과 패널 ── -->
  <div class="right-panel">
    <div class="right-header">
      <button class="tab-btn active" data-tab="recommend">추천 결과</button>
      <button class="tab-btn" data-tab="all">전체 직원 목록</button>
      <span class="result-count" id="result-count">0명</span>
    </div>

    <!-- 추천 탭 -->
    <div class="tab-content active" id="tab-recommend">
      <div id="results"></div>
      <div id="empty">
        <div class="empty-icon">🤖</div>
        <p>회의 제목과 안건을 입력하고<br><strong>관련자 조회</strong> 버튼을 누르세요</p>
      </div>
    </div>

    <!-- 전체 직원 탭 -->
    <div class="tab-content" id="tab-all">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>이름</th>
              <th>부서</th>
              <th>직급</th>
              <th>주요 업무</th>
              <th>태그</th>
              <th>참석 역할</th>
            </tr>
          </thead>
          <tbody id="all-table-body"></tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<script type="module" src="/src/search.js"></script>
</body>
</html>
